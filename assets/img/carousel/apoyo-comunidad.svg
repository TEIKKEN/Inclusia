<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="Comunidad apoyando la inclusión y accesibilidad">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A90E2" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7B61FF" stop-opacity="0.14"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="960" height="640" rx="28" fill="url(#bg)"/>

  <!-- Círculo de unión -->
  <circle cx="480" cy="330" r="210" fill="#FFFFFF" fill-opacity="0.55" stroke="#1F2933" stroke-opacity="0.12"/>

  <!-- 6 personas alrededor (cabeza + cuerpo) -->
  <g fill="#FFFFFF" fill-opacity="0.80" stroke="#1F2933" stroke-opacity="0.14">
    <g transform="translate(480 140)">
      <circle cx="0" cy="0" r="34" fill="#7B61FF" fill-opacity="0.18" stroke="#7B61FF" stroke-opacity="0.55"/>
      <rect x="-40" y="44" width="80" height="96" rx="22"/>
    </g>
    <g transform="translate(660 210)">
      <circle cx="0" cy="0" r="34" fill="#4A90E2" fill-opacity="0.18" stroke="#4A90E2" stroke-opacity="0.55"/>
      <rect x="-40" y="44" width="80" height="96" rx="22"/>
    </g>
    <g transform="translate(710 380)">
      <circle cx="0" cy="0" r="34" fill="#7B61FF" fill-opacity="0.18" stroke="#7B61FF" stroke-opacity="0.55"/>
      <rect x="-40" y="44" width="80" height="96" rx="22"/>
    </g>
    <g transform="translate(480 520)">
      <circle cx="0" cy="0" r="34" fill="#4A90E2" fill-opacity="0.18" stroke="#4A90E2" stroke-opacity="0.55"/>
      <rect x="-40" y="44" width="80" height="96" rx="22"/>
    </g>
    <g transform="translate(250 380)">
      <circle cx="0" cy="0" r="34" fill="#7B61FF" fill-opacity="0.18" stroke="#7B61FF" stroke-opacity="0.55"/>
      <rect x="-40" y="44" width="80" height="96" rx="22"/>
    </g>
    <g transform="translate(300 210)">
      <circle cx="0" cy="0" r="34" fill="#4A90E2" fill-opacity="0.18" stroke="#4A90E2" stroke-opacity="0.55"/>
      <rect x="-40" y="44" width="80" height="96" rx="22"/>
    </g>
  </g>

  <!-- Iconos inclusivos en el centro: corazón + accesibilidad -->
  <path d="M480 318
           C460 288, 410 294, 410 336
           C410 376, 450 404, 480 426
           C510 404, 550 376, 550 336
           C550 294, 500 288, 480 318 Z"
        fill="#7B61FF" fill-opacity="0.20" stroke="#7B61FF" stroke-opacity="0.55" stroke-width="6"/>

  <circle cx="480" cy="330" r="72" fill="none" stroke="#4A90E2" stroke-opacity="0.45" stroke-width="10"/>
  <path d="M480 298 L480 362" stroke="#4A90E2" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
  <path d="M452 330 L508 330" stroke="#4A90E2" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
</svg>
